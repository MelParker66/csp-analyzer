<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSP Ladder – High Volume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="app-header">
        CSP Ladder – High Volume
    </header>
    <p class="header-ref">10 total rows across 4 rungs — analyze + select trades, then monitor capital deployment.</p>

    <nav class="site-nav" aria-label="Main">
        <a href="index.html">CSP Analyzer</a>
        <span class="site-nav-sep" aria-hidden="true">·</span>
        <a href="ladder.html">CSP Ladder Builder</a>
        <span class="site-nav-sep" aria-hidden="true">·</span>
        <span class="site-nav-current">CSP Ladder – High Volume</span>
    </nav>

    <main class="layout layout-single ladder-page ladder-main-split">
        <aside class="ladder-sidebar ladder-sidebar-sticky" aria-label="Capital">
            <section class="card ladder-capital-card" aria-labelledby="capital-invest-heading">
                <h2 id="capital-invest-heading" class="card-title ladder-capital-card-title">Capital to Invest</h2>
                <label class="ladder-capital-label" for="capital-to-invest">Amount (USD)</label>
                <input
                    type="text"
                    id="capital-to-invest"
                    class="ladder-capital-input"
                    value="$0.00"
                    inputmode="decimal"
                    autocomplete="off"
                />
                <div class="ladder-capital-substats">
                    <p class="ladder-capital-stat">
                        <strong>Capital Used:</strong>
                        <span id="capital-used-display">$0.00</span>
                    </p>
                    <p class="ladder-capital-stat">
                        <strong>Capital Remaining:</strong>
                        <span id="capital-remaining-display">$0.00</span>
                    </p>
                    <p class="ladder-capital-stat">
                        <strong>Trades Selected:</strong>
                        <span id="trades-selected-display">0/10</span>
                    </p>
                    <p class="ladder-capital-stat">
                        <strong>Deployment %:</strong>
                        <span id="deployment-pct-display">0.0%</span>
                    </p>
                </div>
            </section>
        </aside>

        <div class="ladder-content-column">
            <div id="ladder-root" class="ladder-root"></div>
        </div>
    </main>

    <div id="ladder-summary" class="ladder-summary-mount"></div>

    <script src="csp-shared.js"></script>
    <script src="ladder-high-volume.js"></script>
</body>
</html>
