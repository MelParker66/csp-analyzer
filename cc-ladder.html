<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Covered Calls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<body class="cc-page">
    <header class="app-header">
        Covered Calls
    </header>
    <p class="header-ref">Five positions — enter leg details, then analyze when ready.</p>

    <nav class="site-nav" aria-label="Main">
        <a href="ladder-high-volume.html">CSP Ladder – High Volume</a>
        <span class="site-nav-sep" aria-hidden="true">·</span>
        <a href="ladder.html">CSP Ladder Builder</a>
        <span class="site-nav-sep" aria-hidden="true">·</span>
        <a href="cc-ladder.html" class="site-nav-current" aria-current="page">Covered Calls</a>
    </nav>

    <main class="layout layout-single ladder-page ladder-main-split ladder-container">
        <aside class="ladder-sidebar ladder-sidebar-sticky capital-panel" aria-label="Capital">
            <section class="card ladder-capital-card" aria-labelledby="capital-invest-heading">
                <h2 id="capital-invest-heading" class="card-title ladder-capital-card-title">Capital to Invest</h2>
                <label class="ladder-capital-label" for="capital-to-invest">Amount (USD)</label>
                <input
                    type="text"
                    id="capital-to-invest"
                    class="ladder-capital-input"
                    value="$0.00"
                    inputmode="decimal"
                    autocomplete="off"
                />
                <div class="ladder-capital-substats">
                    <p class="ladder-capital-stat">
                        <strong>Capital Used:</strong>
                        <span id="capital-used-display">$0.00</span>
                    </p>
                    <p class="ladder-capital-stat">
                        <strong>Capital Remaining:</strong>
                        <span id="capital-remaining-display">$0.00</span>
                    </p>
                    <p class="ladder-capital-stat">
                        <strong>Trades Selected:</strong>
                        <span id="trades-selected-display">0/5</span>
                    </p>
                    <p class="ladder-capital-stat">
                        <strong>Deployment %:</strong>
                        <span id="deployment-pct-display">0.0%</span>
                    </p>
                </div>
            </section>

            <div id="cc-summary" class="ladder-summary-mount"></div>
        </aside>

        <div class="ladder-content-column main-content">
            <div id="cc-ladder-root" class="ladder-root">
                <section class="card ladder-rung" data-rung-id="1">
                    <h2 class="card-title ladder-rung-title">Covered Calls</h2>
                    <div class="cc-input-stack" id="cc-stack">
                        <div class="cc-row" data-row-index="0" id="cc-row-0">
                            <label class="cc-field"><span class="cc-field-label">Ticker</span>
                                <input type="text" class="cc-inp-ticker" placeholder="e.g. AAPL" autocomplete="off" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Expiration</span>
                                <input type="date" class="cc-inp-exp" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">DTE</span>
                                <input type="number" class="cc-inp-dte" step="1" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Contracts</span>
                                <input type="number" class="cc-inp-contracts" value="1" min="1" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Shares Owned</span>
                                <input type="number" class="cc-inp-shares" step="1" min="0" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Cost Basis</span>
                                <input type="number" class="cc-inp-cost-basis" step="any" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Strike</span>
                                <input type="number" class="cc-inp-strike" step="any" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Bid</span>
                                <input type="number" class="cc-inp-bid" step="any" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Ask</span>
                                <input type="number" class="cc-inp-ask" step="any" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Prob ITM</span>
                                <input type="number" class="cc-inp-prob-itm" step="any" />
                            </label>
                            <label class="cc-field"><span class="cc-field-label">Delta</span>
                                <input type="number" class="cc-inp-delta" step="any" />
                            </label>
                            <div class="cc-row-actions">
                                <button type="button" class="btn cc-add-row">Add Row</button>
                                <button type="button" class="btn cc-analyze analyze-button">Analyze</button>
                            </div>
                        </div>
                        <div id="cc-results-row-0" class="cc-analysis-card" aria-live="polite"></div>
